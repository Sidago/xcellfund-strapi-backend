version: "3"

services:
  strapi-backend-xcellfund:
    build: .
    image: strapi-backend-xcellfund:latest
    container_name: strapi-backend-xcellfund

    env_file:
      - .env

    ports:
      - "1337:1337"

    volumes:
      - ./public/uploads:/app/public/uploads

    restart: unless-stopped